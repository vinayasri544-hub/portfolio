<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact Page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Contact Me</h1>
</header>

<main>

<form aria-label="Contact Form">

<label for="name">Full Name</label>
<input
type="text"
id="name"
name="name"
required
aria-required="true">

<label for="email">Email Address</label>
<input
type="email"
id="email"
name="email"
required
aria-required="true">

<label for="message">Message</label>
<textarea
id="message"
name="message"
rows="5"
required
aria-required="true"></textarea>

<button type="submit">
Send Message
</button>

</form>

</main>

<footer>
    <p>&copy; 2026 Sivapriya V</p>
</footer>

</body>
</html>
